name: bahaykubo
description: A Flutter app for Bahay Kubo AR Experiences.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  path: ^1.9.1
  path_provider: ^2.1.5
  video_player: ^2.8.1
  camera: ^0.10.5+2
  permission_handler: ^11.0.1
  audioplayers: ^6.5.1
  http: ^1.1.0
  image_picker: ^1.1.2
  vector_math: ^2.1.4
  flutter_3d_controller: ^2.0.2
  webview_flutter: ^4.4.2
  lottie: ^3.3.2
  pdf: ^3.11.3
  printing: ^5.9.1
  shared_preferences: ^2.5.3
  flutter_tts: ^4.2.3
  geolocator: ^11.0.1
  geocoding: ^4.0.0
  flutter_map: ^8.2.2
  flutter_compass: ^0.8.1
  flutter_dotenv: ^5.1.0
  supabase_flutter: ^2.1.2
  go_router: ^12.1.3 
  tflite_flutter: ^0.12.1
  sensors_plus: ^7.0.0
  google_maps_flutter: ^2.14.0
  location: ^8.0.1
  sqflite: ^2.4.2
  arkit_plugin: ^1.0.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/faculty/Pm.png
    - assets/images/
    - assets/video/
    - assets/audio/bahay.mp3
    - assets/audio/bahay-1.mp3
    - assets/audio/mahusay.mp3
    - assets/audio/galing.mp3
    - assets/audio/correct.mp3
    - assets/audio/error.mp3
    - assets/animations/manwalking.json